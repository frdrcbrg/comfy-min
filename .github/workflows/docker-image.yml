name: Build Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.slim
      - start.sh
      - constraints.txt
      - custom_nodes.txt
      - custom_nodes/**
      - expected_nodes.txt
      - scripts/**
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build, test, and push linux/amd64 image
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Relocate Docker storage to /mnt
        run: |
          sudo systemctl stop docker docker.socket || true
          sudo mkdir -p /mnt/docker
          echo '{ "data-root": "/mnt/docker" }' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          docker info | grep -i "Docker Root Dir" || true
          df -h / /mnt || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ComfyUI import gate
        run: docker run --rm --entrypoint bash ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} /opt/scripts/comfyui_import_gate.sh

      - name: Push image
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          docker tag "${IMAGE_NAME}:ci-${GITHUB_SHA}" "${IMAGE_NAME}:latest"
          docker tag "${IMAGE_NAME}:ci-${GITHUB_SHA}" "${IMAGE_NAME}:sha-${SHORT_SHA}"
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:sha-${SHORT_SHA}"

  build-slim:
    name: Build and push linux/amd64 slim image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=slim,enable={{is_default_branch}}
            type=sha,prefix=slim-sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.slim
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
